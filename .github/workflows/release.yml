name: Release artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Build distributions
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify wheel
        run: |
          python -m venv /tmp/dedupe-release
          /tmp/dedupe-release/bin/python -m pip install dist/*.whl
          /tmp/dedupe-release/bin/python -m pip check
          /tmp/dedupe-release/bin/dedupe doctor --json >/dev/null
      - uses: actions/upload-artifact@v4
        with:
          name: dedupe-python-distributions
          path: dist/*
          if-no-files-found: error
      - name: Publish tagged GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes --verify-tag
