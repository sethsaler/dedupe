name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package and test dependencies
        run: python -m pip install --upgrade pip && python -m pip install --editable '.[dev]'
      - name: Run tests
        run: pytest -q

  e2e:
    name: Browser workflow (Python 3.11)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install package and browser test dependencies
        run: python -m pip install --upgrade pip && python -m pip install --editable '.[dev]'
      - name: Install Chromium and system dependencies
        run: python -m playwright install --with-deps chromium
      - name: Run browser tests
        run: pytest -q -m e2e

  quality-and-package:
    name: Lint and package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install development tools
        run: python -m pip install --upgrade pip && python -m pip install '.[dev]'
      - name: Run Ruff
        run: ruff check src tests
      - name: Build distributions
        run: python -m build
      - name: Validate wheel installation
        run: |
          python -m venv /tmp/dedupe-wheel
          /tmp/dedupe-wheel/bin/python -m pip install dist/*.whl
          /tmp/dedupe-wheel/bin/python -m pip check
          /tmp/dedupe-wheel/bin/dedupe --help >/dev/null
